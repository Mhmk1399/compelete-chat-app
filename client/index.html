<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="icon" href="/favicon.ico?v=2" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-32.png?v=2" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/icon-16.png?v=2" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-180.png?v=2" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#010413" />
    <style>
      html,
      body {
        background: #ffffff;
      }
      html.sb-preload-dark,
      html.sb-preload-dark body {
        background: #010413;
      }
    </style>
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("cheetah-chat-theme");
          var isDark = stored === "dark";
          if (isDark) {
            var root = document.documentElement;
            root.classList.add("dark", "sb-preload-dark");
            root.style.colorScheme = "dark";
            root.style.backgroundColor = "#010413";
            var meta = document.querySelector('meta[name="theme-color"]');
            if (meta) meta.setAttribute("content", "#010413");
          }
        } catch (_) {}
      })();
    </script>
    <title>Cheetah Chat</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
