server {
    listen 80;
    server_name chat.vtechs.online;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name chat.vtechs.online;

    ssl_certificate /etc/letsencrypt/live/chat.vtechs.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chat.vtechs.online/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    client_max_body_size 225M;

    location / {
        proxy_pass http://app:5174;l
        proxy_http_version 1.1;

        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_read_timeout 86400s;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}cd 