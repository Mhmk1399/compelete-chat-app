services:

  app:
    build: .
    image: cheeta:test
    container_name: cheeta-app
    restart: unless-stopped
    env_file: .env
    volumes:
      - cheeta-data:/app/data
    expose:
      - "5174"          # only reachable inside Docker network, NOT from host
    depends_on: []

  nginx:
    image: nginx:alpine
    container_name: cheeta-nginx
    restart: unless-stopped
    ports:
      - "80:80"         # this is the only port exposed to the outside world
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

volumes:
  cheeta-data: