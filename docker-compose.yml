services:
  app:
    build: .
    image: cheeta:prod
    container_name: cheeta-app
    restart: unless-stopped
    env_file: .env
    volumes:
      - cheeta-data:/app/data
    expose:
      - "5174"

  nginx:
    image: nginx:alpine
    container_name: cheeta-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - app

volumes:
  cheeta-data: